name: Deploy FreshLi4 site to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: freshli4-site-build
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_fgZDKAyd5k5UrtCgyFCqs7At
  VERCEL_PROJECT_ID: prj_MaJCD4zvFmlX9VGuWlq3oyuE0bPt

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build site
        run: npm run build
      - name: Run static checks
        run: node --test tests/rendered-html.test.mjs
      - name: Install Vercel CLI
        run: npm install --global vercel@54.14.5
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build Vercel production output
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
